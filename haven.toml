# haven configuration
# Run `haven help` for usage.

[profile.default]
modules = ["shell", "utilities", "vcs"]

[profile.macos]
extends = "default"
modules = ["macos", "ai"]


[vcs]
backend = "jj"


[security]
allow = [
  "~/.ssh/config",   # config file has no secrets
  "~/.ssh/id_rsa.pub",      # public key - not secret
]
