# haven configuration
# Run `haven help` for usage.

[profile.default]
modules = ["packages", "shell", "utilities"]

[profile.macos]
extends = "default"
modules = ["macos"]


[vcs]
backend = "jj"


[security]
allow = [
  "~/.ssh/config",   # config file has no secrets
  "~/.ssh/id_rsa.pub",      # public key - not secret
]
