config-version = 2

exec-on-workspace-change = ['/usr/bin/env', 'fish', '/Users/jstegeman/bin/set_wp_for_workspace.fish']

start-at-login = true
auto-reload-config = false

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'stack'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
[[on-monitor-changed]]
run = ['exec-and-forget /opt/homebrew/bin/sketchybar --reload']
after-startup-command = [
    'exec-and-forget /opt/homebrew/bin/sketchybar --reload',
    'exec-and-forget /opt/homebrew/bin/borders active_color=0xffffffff inactive_color=0x00000000 width=4.0 hidpi=on',
]
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["1", "2", "3", "4", "5"]

on-mode-changed = []

accordion-padding = 30

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 5
    inner.vertical =   5
    outer.left =       5
    outer.bottom =     5
    outer.top =        5
    outer.right =      5

[floating]
app-ids = [
    'com.mitchellh.ghostty',
    'com.cmuxterm.app',
    'com.granola.app',
    'com.raycast.macos',
    'com.1password.1password',
    'com.apple.MobileSMS',
    'com.cron.electron',
    'com.edisonmail.edisonmail',
    'com.apple.finder',
    'com.apple.FaceTime',
    'com.apple.QuickTimePlayerX',
    'com.amazon.QuickWork.mac',
    'Cisco-Systems.Spark',
]

[meeting]
preset = 'meeting'
workspace = '1'
app-ids = [
    'company.thebrowser.dia',
    'us.zoom.xos',
    'com.microsoft.teams2',
    'Cisco-Systems.Spark',
]
support-app-ids = ['com.granola.app']
meeting-zone = 'center'
support-zone = 'right'

# Window-detection rules for non-default behaviors
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['move-node-to-zone center']

[[on-window-detected]]
if.app-id = 'company.thebrowser.dia'
if.window-title-regex-substring = '^Personal:'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'company.thebrowser.dia'
if.window-title-regex-substring = '^Work:'
run = 'move-node-to-workspace 1'

[mode.main.binding]
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus --ignore-floating left'
    alt-a = 'focus --ignore-floating down'
    alt-o = 'focus --ignore-floating up'
    alt-e = 'focus --ignore-floating right'

    # Zone bindings (ultrawide)
    hyper-h = 'move-node-to-zone left'
    hyper-a = 'move-node-to-zone center'
    hyper-e = 'move-node-to-zone right'
    meh-h   = 'move-floating-to-zone left'
    meh-a   = 'move-floating-to-zone center'
    meh-e   = 'move-floating-to-zone right'
    alt-ctrl-h = 'focus-zone left'
    alt-ctrl-a = 'focus-zone center'
    alt-ctrl-e = 'focus-zone right'
    alt-ctrl-tab = 'focus-zone --scope mru'

    hyper-b = 'exec-and-forget aerospace zone-preset balanced'
    hyper-f = 'exec-and-forget aerospace zone-focus-mode toggle'
    hyper-m = 'exec-and-forget aerospace meeting-mode toggle'
    hyper-0 = 'exec-and-forget aerospace zone-preset --reset'

    # Move within tiling tree
    alt-shift-a = 'move down'
    alt-shift-o = 'move up'
    alt-shift-e = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'summon-workspace 1'
    alt-2 = 'summon-workspace 2'
    alt-3 = 'summon-workspace 3'
    alt-4 = 'summon-workspace 4'
    alt-5 = 'summon-workspace 5'
    alt-p = 'summon-workspace P'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-p = 'move-node-to-workspace P'

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
    alt-shift-semicolon = 'mode service'

    alt-shift-f = 'layout floating'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-a = ['join-with down', 'mode main']
    alt-shift-o = ['join-with up', 'mode main']
    alt-shift-e = ['join-with right', 'mode main']

[zones]
gap = 10
focus-mode-collapsed-width = 80

[[zones.zone]]
id = "left"
width = 0.25812133072407045
layout = "stack"

[[zones.zone]]
id = "center"
width = 0.46198303979125893
layout = "stack"

[[zones.zone]]
id = "right"
width = 0.2798956294846706
layout = "stack"

[zones.behavior.left]
new-window = 'append-hidden'

[zones.behavior.center]
new-window = 'after-focused'

[zones.behavior.right]
new-window = 'after-focused'


[zones.app-routing]
"company.thebrowser.dia" = 'center'
"us.zoom.xos" = 'center'
"com.microsoft.teams2" = 'center'
"Cisco-Systems.Spark" = 'center'
"com.granola.app" = 'right'


