#!/usr/bin/env bash

# Ayu Dark colors for Tmux

set -g mode-style "fg=#FF8F40,bg=#273747"

set -g message-style "fg=#FF8F40,bg=#273747"
set -g message-command-style "fg=#FF8F40,bg=#273747"

set -g pane-border-style "fg=#273747"
set -g pane-active-border-style "fg=#FF8F40"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#FF8F40,bg=#0F131A"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#0A0E14,bg=#FF8F40,bold] #S #[fg=#FF8F40,bg=#0F131A,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#0F131A,bg=#0F131A,nobold,nounderscore,noitalics]#[fg=#FF8F40,bg=#0F131A] #{prefix_highlight} #[fg=#273747,bg=#0F131A,nobold,nounderscore,noitalics]#[fg=#FF8F40,bg=#273747] %Y-%m-%d  %I:%M %p #[fg=#FF8F40,bg=#273747,nobold,nounderscore,noitalics]#[fg=#0A0E14,bg=#FF8F40,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#0F131A,bg=#0F131A,nobold,nounderscore,noitalics]#[fg=#FF8F40,bg=#0F131A] #{prefix_highlight} #[fg=#273747,bg=#0F131A,nobold,nounderscore,noitalics]#[fg=#FF8F40,bg=#273747] %Y-%m-%d  %H:%M #[fg=#FF8F40,bg=#273747,nobold,nounderscore,noitalics]#[fg=#0A0E14,bg=#FF8F40,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#BFBDB6,bg=#0F131A"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#5A6673,bg=#0F131A"
setw -g window-status-format "#[fg=#0F131A,bg=#0F131A,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#0F131A,bg=#0F131A,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#0F131A,bg=#273747,nobold,nounderscore,noitalics]#[fg=#FF8F40,bg=#273747,bold] #I  #W #F #[fg=#273747,bg=#0F131A,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#E6B450]#[bg=#0F131A]#[fg=#0F131A]#[bg=#E6B450]"
set -g @prefix_highlight_output_suffix ""
